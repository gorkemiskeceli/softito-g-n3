<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><center>
    <div>
        <h1>map() ve filter() Dizi methodları</h1>
    </div><hr>
    <div>
        <label>Ürün Arama</label>
        <input type="text" id="input-search">
    </div><br>
    <div>
        <label>Fiyat</label>
        <input type="number" id="input-price-limit" value="50000">
    </div><br>
    <div>
        <button id="btn-filter">Filtrele</button>
    </div><br>
    <div>
        <h3>Ürün Listesi</h3>
        <div id="products-list"></div>
    </div>
    </center>

    <script>
        const products = [
            {id:1, adı: 'iphone 17 pro max', fiyat: 110000},
            {id:2, adı: 'iphone 16 pro max', fiyat: 25000},
            {id:3, adı: 'iphone 15 pro max', fiyat: 47000},
            {id:4, adı: 'iphone 14 pro max', fiyat: 99000},
            {id:5, adı: 'iphone 13 pro max', fiyat: 78000},
        ]
        const listele=()=>{
            const arama = document.getElementById('input-search').value.toLowerCase();
            const limit = parseFloat(document.getElementById('input-price-limit').value)||99999;

            const filtrelenmis = products.filter(product =>{
                return product.adı.toLowerCase().includes(arama) && product.fiyat <= limit;
            })

            const kartlarHTML = filtrelenmis.map(product =>`
            <div>
                <span>${product.adı}</span>
                <span>${product.fiyat}</span>
            </div>    
            `).join('');

            document.getElementById('products-list').innerHTML = kartlarHTML || `<div></div>`;


        }

        document.getElementById('btn-filter').addEventListener('click', listele);
        listele();


    </script>

</body>
</html>
