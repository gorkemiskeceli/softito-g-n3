<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title><link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="p-6 bg-gray-300">
    
    <div  class="p-6 bg-white">
        <h1 class="text-xl font-bold">E-Ticaret sepet Yönetimi</h1>
        <div class="p-4 border">
            <h2 class="text-lg font-bold">Ürün Katalog</h2>
            <div class="mb-2">
                <input type="text" id="search-input" placeholder="ürün adı ara" class="p-2 border">
            </div>
            <button id="btn-search" class="p-2 bg-blue-200">Katalog Güncelle</button>
            <div class="mt-2 space-y-2" id="product-list">
                <p class="text-gray-500">Ürün Listesini yüklemek için butona tıklayın</p>
            </div>
        </div>

        <div class="mt-2"></div>

        <div class="p-4 border">
            <h2 class="text-lg font-bold">Alışveriş sepetim</h2>
            <ul class="list-disc pl-5 space-y-1" id="card-list">
                <li>Sepetiniz boş</li>
            </ul>
            <div class="mt-2 font-bold">
                Toplam Tutar: <span id="card-total">0</span>
            </div>
            <button id="btn-checkout" class="p-2 bg-green-200 mt-2">Alışverişi tamamla</button>
        </div>

        <div id="status" class="p-2 border">
            Sistem Hazır
        </div>
    </div>


    <script>
        const yedekUrunler = [
            {"id":1,"title": "Akıllı telefon",'kategori':'elektronik','fiyat':'15000','stok':5},
            {"id":2,"title": "Akıllı saat",'kategori':'elektronik','fiyat':'16000','stok':0},
            {"id":3,"title": "Akıllı televizyon",'kategori':'elektronik','fiyat':'17000','stok':2},
            {"id":4,"title": "T-shirt ",'kategori':'giyim','fiyat':'1000','stok':1},
            {"id":5,"title": "Pantalon",'kategori':'giyim','fiyat':'10000','stok':6},
            {"id":6,"title": "ayakkabı",'kategori':'ayakkabı','fiyat':'12000','stok':7},
            {"id":7,"title": "pizza",'kategori':'yemek','fiyat':'21000','stok':9},
            {"id":8,"title": "tavuk pilav",'kategori':'yemek','fiyat':'23000','stok':1},
            {"id":9,"title": "ayran",'kategori':'içecek','fiyat':'43000','stok':4},
            {"id":10,"title": "strap",'kategori':'spor ekipmanı','fiyat':'77000','stok':7}
        ]

        let sepet = [];

        const urunleriSorgula = async()=>{
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const listDiv = document.getElementById('product-list');
            const status = document.getElementById('status');

            status.innerText = "Ürünler Listeleniyor...";
            status.className = 'p-2 border';

            let urunler = [];

            try{
                const response = await axios.get('https://kodusta.com/api/urunler.json');
                urunler = response.data;
            }catch(hata){
                console.warn('Cors hatası veya bağlantı hatası');
                urunler = yedekUrunler; 
            }

            const filtrelenmiş = urunler.filter(u=> u.title.toLowerCase().includes(searchVal));

            listDiv.innerHTML = "";
            if(filtrelenmiş.length === 0){
                listDiv.innerHTML ='<p class="p-2 text-red-500">Ürün bulunamadı</p>';
                return;
            }

            filtrelenmiş.forEach(urun=>{
                const itemDiv = document.createElement('div');
                itemDiv.className = "p-2 border";

                itemDiv.innerHTML = `
                    <strong>${urun.title}</strong> - kategor: ${urun.kategori}<br>
                    Fiyat: ${urun.fiyat}TL | Stok: ${urun.stok > 0 ? urun.stok: 'tukenmiş'}<br>
                    <button class = "p-1 bg-yellow-200 text-xs" onclick = "sepeteEkleTiklandi(${urun.id})">Sepete Ekle</button>
                `;

                listDiv.appendChild(itemDiv);
            })

        }

        const stokKontrolEt = (urun)=>{
            return new Promise  ((resolve, reject)=>{
                setTimeout(()=>{
                    if(urun && urun.stok >0){
                        resolve('urun stokta mevcut sepete ekleniyor');
                    }else{
                        reject(`Hata:${urun.title} stokta kalmadığı için sepete eklenemedi`)
                    }
                }, 500)
            })
        }

        const sepetGuncelle = (callback)=>{
            const cardList = document.getElementById('card-list');
            cardList.innerHTML = '';

            sepet.forEach(item=>{
                const li = document.createElement('li');
                li.innerText = `
                    ${item.title}-${item.fiyat}TL
                `;
                cardList.appendChild(li);
            })
            const toplam = sepet.reduce((toplam, item) => toplam + Number(item.fiyat), 0);
            callback(toplam);
        }

        window.sepeteEkleTiklandi = async(urunId) =>{
            const status =  document.getElementById('status');
            status.innerText = "Stok sorgulanıyor...";
            status.className = "p-2 border";


            const urun = yedekUrunler.find(u => u.id === urunId);

            try{
                const stokMesaji = await stokKontrolEt(urun);
                sepet.push(urun);
                sepetGuncelle((faturaTutari)=>{
                    document.getElementById('card-total').innerText = faturaTutari;
                    status.className = 'p-2 bg-green-200';
                    status.innerText = `
                        ${urun.title} başarıyla sepete eklendi. Toplam sepet tutarınız: ${faturaTutari} TL
                    `;
                })
            }catch(hata){
                status.className = 'p-2 bg-red-200';
                status.innerText = hata.message ? hata.message : hata;
            }

        }

        const siparisiTamamla = async()=>{
            const status = document.getElementById('status');
            if(sepet.length === 0){
                status.className = 'p-2 bg-red-200';
                status.innerText = "hata: sepetiniz boş olduğu için sipariş veremezsiniz!.";
                return;
            }

            status.innerText = "siparişiniz sunucuya (satıcıya) gönderiliyor...";
            status.className = "p-2 border";

            try{
                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method : 'POST',
                    headers : {
                        'Content-Type':'application/json'
                    },
                    body : JSON.stringify({
                        siparisler:sepet,
                        toplamTutar:Number(document.getElementById('card-total').innerText)
                    })

                })
                if(!response.ok){
                    throw new Error('sipariş sunucu tarafından reddedildi!');
                }

                const cevap = await response.json();

                status.className = 'p-2 bg-green-200';
                status.innerHTML = `
                    Sipariş Başarıyla Alındı! Sipariş Kodu: ${cevap.id} (Sepetiniz Sıfırlandı)
                `;

                sepet = [];
                sepetGuncelle((faturaTutari) =>{
                    document.getElementById('card-total').isContentEditable = faturaTutari;
                    document.getElementById('card-list').innerHTML = '<li>Sepetiniz Boş</li>';
                })

            }catch(hata){
                status.className = "p-2 bg-red-200";
                status.innerText = "Sipariş Hatası: "+hata.message;
            }

        }

        document.getElementById('btn-search').addEventListener('click', urunleriSorgula);
        document.getElementById('btn-checkout').addEventListener('click', siparisiTamamla);



    </script>
</body>
</html>
