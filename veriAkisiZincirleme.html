<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
    />
</head>
<body class="p-6 bg-gray-500 flex flex-col items-center justify-center gap-3">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">Veri Akışı zincirleme</h1>
        <button id="btn-start" class="bg-green-200">Sipariş Detaylandır</button> 
        <div id="result" class="mt-4 whitespace-pre-line">İşlem Başlatılmadı</div>
    </div>


    <script>
        console.log("Script çalıştı");

        const kullaniciyiGetir = ()=>{
            return new Promise ((resolve)=>{
                setTimeout(()=>{
                    resolve({id:42, ad:'onur',uyelik:'standart'})
                },2000)
            })
        }


        const sepetiGetir = (kullanici)=>{
            return new Promise((resolve)=>{
                setTimeout(()=>{
                   resolve({
                    sahip:kullanici.ad,
                    urunler:['Akıllı saat', 'Rimel']
                   })
                }, 1000)
            })
        }



        const faturaHesapla = (sepet)=>{
            return new Promise((resolve)=>{
                setTimeout(()=>{
                    resolve(`Müşteri:${sepet.sahip}\nUrünler:${sepet.urunler.join(',')}\nFatura turarı: 2500 TL (Kargo Bedava)`);
                }, 2000)
            })
        }


        document.getElementById('btn-start').addEventListener('click', ()=>{
            const output = document.getElementById('result');
            output.innerText = 'Müşteri sorgulanıyor...';

            kullaniciyiGetir().then((kullanici)=>{
                console.log("Kullanıcı geldi", kullanici);
                output.innerText = `
                Müşteri Bulundu : ${kullanici.ad}\n Sepet Aranıyor...
                `;
                return sepetiGetir(kullanici);
            }).then((sepet)=>{
                output.innerText = `Sepet alındı: ${sepet.urunler.join(', ')}\n Fatura Hesaplanıyor...`;
                return faturaHesapla(sepet);
            }).then((faturaOzeti)=>{
                output.innerText = faturaOzeti;
            })
        })
    </script>
</body>
</html>
