<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
    />
</head>
<body class="p-6 bg-gray-300">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">Kullanıcı Listesi Fetch Get</h1>
        <div class="mb-4">
            <input type="text" id="search-input" placeholder="İsim ile Ara" class="p-2 border">
        </div>
        <button id="btn-load" class="p-2 bg-blue-200 mb-4">Listeyi yükle</button>
        <ul id="user-list" class="List-disc pl-2 space-y-1">
            <li>Ali abi bitmiş</li>
        </ul>
    </div>
    <script>
        let tumKullanicilar = [];
        const yedekKullanicilar = [
            {'id':1, 'name':'Ali Yılmaz', 'email:':'ali@gmail.com','sehir':'corum'},
            {'id':2, 'name':'ece lale', 'email:':'ece@gmail.com','sehir':'itanbul'},
            {'id':3, 'name':'ezgi hale', 'email:':'ezgi@gmail.com','sehir':'adana'},
            {'id':4, 'name':'mahmut nevales', 'email:':'mahmut@gmail.com','sehir':'izmir'},
        ];


        const listeyiCiz = (kullanicilar)=>{
            const listElement = document.getElementById('user-list');
            listElement.innerHTML = '';
            if(kullanicilar.length === 0){
                listElement.innerHTML = '<li>Eşlenen kullanıcı bulunamadı</li>';
                return;
            }
            kullanicilar.forEach(user =>{
                const li = document.createElement('li');
                li.innerHTML = `<strong> ${user.name}</strong> E-posta: ${user.email} (şehir: ${user.sehir})`;
                listElement.appendChild(li);
            })
        }

        const kullanicilariYukle = async()=>{
            const listElement = document.getElementById('user-list');
            listElement.innerHTML = '<li>Kullanıcıları yükleniyor....</li>';

            try{
                const response = await fetch('https://kodusta.com/api/kullanicilar.json');
                if(!response.ok){                        throw new Error('sunucu hatasi' + response.status);
                }
                tumKullanicilar = await response.json();
            }catch(hata){
                console.warn('CORS engeli veya bağlantı hatası, Yedek veriler kullanılacak');
                tumKullanicilar = yedekKullanicilar;
            }
            listeyiCiz(tumKullanicilar);
        }
            

        document.getElementById('search-input').addEventListener('input', (e)=>{
            const aramaKelimesi = e.target.value.toLowerCase();
            const filtrelenmiş = tumKullanicilar.filter(user =>user.name.toLowerCase().includes(aramaKelimesi));
            listeyiCiz(filtrelenmiş);
        })
        document.getElementById('btn-load').addEventListener('click', kullanicilariYukle);
    </script>





</body>
</html>
